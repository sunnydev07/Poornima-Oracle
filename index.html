<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#09090b" />
    <title>Poornima Oracle | RAG Agent</title>

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Markdown parsing and sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }

        .glass {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-input {
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-ambient {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .chat-orb {
            position: absolute;
            width: clamp(14rem, 28vw, 24rem);
            height: clamp(14rem, 28vw, 24rem);
            border-radius: 9999px;
            filter: blur(64px);
            opacity: 0.3;
            will-change: transform;
            animation-name: float;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            animation-timing-function: ease-in-out;
        }

        .chat-orb-cyan {
            top: 8%;
            left: 7%;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.9) 0%, rgba(34, 211, 238, 0) 68%);
            animation-duration: 12s;
        }

        .chat-orb-blue {
            right: 8%;
            top: 24%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.9) 0%, rgba(59, 130, 246, 0) 68%);
            animation-duration: 18s;
            animation-delay: 1.4s;
        }

        .chat-orb-purple {
            left: 36%;
            bottom: 3%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.85) 0%, rgba(168, 85, 247, 0) 70%);
            animation-duration: 20s;
            animation-delay: 2.7s;
        }

        .chat-bottom-fade {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 96px;
            pointer-events: none;
            z-index: 20;
            background: linear-gradient(to bottom, transparent, rgba(9, 9, 11, 0.6), #09090b);
        }

        .aurora-glow {
            animation: aurora 4s ease-in-out infinite;
        }

        .oracle-avatar-breathe {
            animation: breathe 4s ease-in-out infinite;
            border-radius: 9999px;
        }

        .typing-shimmer {
            display: block;
            width: 6rem;
            height: 0.375rem;
            flex-shrink: 0;
            border-radius: 9999px;
            background: linear-gradient(90deg, rgba(34, 211, 238, 0.12), rgba(103, 232, 249, 0.85), rgba(168, 85, 247, 0.18));
            background-size: 240% 100%;
            animation: shimmer 1.5s infinite;
        }

        .copy-tooltip {
            position: absolute;
            left: 50%;
            top: -2rem;
            transform: translateX(-50%);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 0.5rem;
            background: rgba(8, 145, 178, 0.16);
            color: #cffafe;
            font-size: 10px;
            font-weight: 700;
            line-height: 1;
            opacity: 0;
            padding: 0.35rem 0.5rem;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            white-space: nowrap;
        }

        .copy-tooltip.is-visible {
            opacity: 1;
            transform: translate(-50%, -2px);
        }

        @keyframes float {
            0% {
                transform: translate(-30px, -18px) scale(0.98);
            }

            50% {
                transform: translate(16px, 30px) scale(1.05);
            }

            100% {
                transform: translate(30px, -30px) scale(1);
            }
        }

        @keyframes staggerIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes aurora {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 0.9;
            }
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(6, 182, 212, 0.22);
            }

            50% {
                transform: scale(1.03);
                box-shadow: 0 0 44px rgba(34, 211, 238, 0.42);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -120% 0;
            }

            100% {
                background-position: 120% 0;
            }
        }

        #click-spark-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .safe-pb {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Sidebar Transitions */
        .sidebar-transition {
            transition: width 0.3s ease-in-out, transform 0.3s ease-in-out;
        }

        /* Hide text when sidebar is collapsed */
        .collapsed .sidebar-text {
            display: none;
            opacity: 0;
        }

        .collapsed .sidebar-header-text {
            display: none;
        }

        .collapsed .new-chat-text {
            display: none;
        }

        /* Center icons when collapsed */
        .collapsed .sidebar-item {
            justify-content: center;
            padding: 12px;
        }

        .collapsed .sidebar-icon {
            margin-right: 0;
        }

        .ai-markdown {
            overflow-wrap: anywhere;
        }

        .ai-markdown p {
            margin: 0.45rem 0;
            line-height: 1.7;
        }

        .ai-markdown p:first-child {
            margin-top: 0;
        }

        .ai-markdown p:last-child {
            margin-bottom: 0;
        }

        .ai-markdown strong {
            color: #ffffff;
            font-weight: 700;
        }

        .ai-markdown em {
            color: #d4d4d8;
        }

        .ai-markdown ul,
        .ai-markdown ol {
            margin: 0.6rem 0;
            padding-left: 1.25rem;
        }

        .ai-markdown ul {
            list-style: disc;
        }

        .ai-markdown ol {
            list-style: decimal;
        }

        .ai-markdown li {
            margin: 0.25rem 0;
            line-height: 1.6;
        }

        .ai-markdown code {
            background: rgba(244, 63, 94, 0.12);
            border: 1px solid rgba(244, 63, 94, 0.18);
            border-radius: 0.35rem;
            color: #fda4af;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9em;
            padding: 0.08rem 0.3rem;
        }

        .ai-markdown pre {
            background: rgba(9, 9, 11, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.8rem;
            margin: 0.75rem 0;
            overflow-x: auto;
            padding: 0.8rem;
        }

        .ai-markdown pre code {
            background: transparent;
            border: 0;
            color: #e4e4e7;
            padding: 0;
        }

        .ai-markdown blockquote {
            border-left: 3px solid rgba(34, 211, 238, 0.55);
            color: #d4d4d8;
            margin: 0.75rem 0;
            padding-left: 0.85rem;
        }

        .ai-markdown table {
            border-collapse: collapse;
            display: block;
            margin: 0.8rem 0;
            max-width: 100%;
            overflow-x: auto;
            width: max-content;
        }

        .ai-markdown th,
        .ai-markdown td {
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 0.5rem 0.65rem;
            text-align: left;
            vertical-align: top;
        }

        .ai-markdown th {
            background: rgba(34, 211, 238, 0.1);
            color: #cffafe;
            font-weight: 700;
        }

        .feedback-button[aria-pressed="true"] {
            background: rgba(34, 211, 238, 0.16);
            border-color: rgba(34, 211, 238, 0.45);
            color: #67e8f9;
        }

        .speech-button[aria-pressed="true"],
        .auto-read-toggle[aria-pressed="true"] {
            background: rgba(34, 211, 238, 0.16);
            border-color: rgba(34, 211, 238, 0.45);
            color: #67e8f9;
        }

        .mic-listening {
            animation: micPulse 1.15s ease-out infinite;
            background: rgba(244, 63, 94, 0.14);
            border-color: rgba(244, 63, 94, 0.55);
            color: #fb7185;
        }

        @keyframes micPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.45);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(244, 63, 94, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(244, 63, 94, 0);
            }
        }
    </style>
</head>

<body class="bg-zinc-950 text-slate-200 font-sans overflow-hidden h-[100dvh] selection:bg-cyan-500/30 flex flex-col">

    <canvas id="click-spark-canvas"></canvas>

    <!-- API Setup Modal -->
    <div id="apiModal"
        class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex items-center justify-center hidden transition-opacity duration-300 px-4">
        <div class="glass bg-zinc-900/90 rounded-2xl p-6 max-w-md w-full shadow-2xl transform transition-all scale-100">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-2 bg-cyan-500/10 rounded-lg">
                    <i data-lucide="settings" class="w-5 h-5 text-cyan-400"></i>
                </div>
                <h2 class="text-xl font-bold text-white">Setup API</h2>
            </div>
            <p class="text-zinc-400 text-sm mb-4">Configure your backend API endpoint.</p>
            <input type="text" id="apiEndpoint"
                class="w-full glass-input px-4 py-3 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-cyan-500/50 transition-all mb-4 text-sm"
                placeholder="https://poornima-oracle.onrender.com/api/chat" />
            <div class="flex justify-end gap-3">
                <button onclick="skipSetup()"
                    class="px-4 py-2 text-sm text-zinc-400 hover:text-white transition-colors">Demo Mode</button>
                <button onclick="saveApiEndpoint()"
                    class="px-5 py-2 bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-bold rounded-xl shadow-lg shadow-cyan-900/20 transition-all">Save</button>
            </div>
        </div>
    </div>

    <!-- Mobile Sidebar Overlay with Heavy Blur -->
    <div id="sidebarOverlay"
        class="fixed inset-0 bg-black/60 backdrop-blur-md z-[10] md:hidden hidden transition-all duration-300"
        onclick="closeMobileSidebar()"></div>

    <div class="flex h-full relative z-10 w-full">

        <!-- Sidebar -->
        <aside id="sidebar"
            class="sidebar-transition fixed md:relative z-[70] h-full w-[85%] max-w-[300px] md:w-72 -translate-x-full md:translate-x-0 bg-black/80 backdrop-blur-3xl border-r border-white/10 flex flex-col shadow-2xl md:shadow-none">

            <!-- Sidebar Header -->
            <div class="p-4 border-b border-white/10 flex items-center justify-between pt-safe-top h-16">
                <div class="flex items-center gap-3 overflow-hidden whitespace-nowrap">
                    <div class="w-8 h-8 bg-cyan-500/10 rounded-lg flex items-center justify-center shrink-0">
                        <i data-lucide="bot" class="w-5 h-5 text-cyan-400"></i>
                    </div>
                    <h2 class="sidebar-header-text text-white font-bold tracking-wide text-sm uppercase">
                        History
                    </h2>
                </div>

                <!-- Desktop Collapse Button -->
                <button onclick="toggleSidebarDesktop()"
                    class="hidden md:flex p-1.5 hover:bg-white/10 rounded-lg text-zinc-400 hover:text-white transition">
                    <i id="collapseIcon" data-lucide="chevron-left" class="w-5 h-5 transition-transform"></i>
                </button>

                <!-- Mobile Close Button -->
                <button onclick="closeMobileSidebar()"
                    class="md:hidden p-2 hover:bg-white/10 rounded-lg text-zinc-400 transition active:scale-95">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- New Chat Button -->
            <div class="p-4 pb-2">
                <button onclick="startNewChat()"
                    class="sidebar-item w-full flex items-center gap-3 p-3.5 bg-white/5 hover:bg-white/10 border border-white/5 hover:border-white/20 rounded-xl text-white transition-all group hover:shadow-[0_0_10px_rgba(255,255,255,0.1)] active:scale-95 touch-manipulation">
                    <i data-lucide="plus"
                        class="sidebar-icon w-5 h-5 text-cyan-400 group-hover:rotate-90 transition-transform shrink-0"></i>
                    <span class="sidebar-text text-sm font-medium whitespace-nowrap">New Chat</span>
                </button>
            </div>

            <!-- Conversations List (dynamically populated by JS) -->
            <div class="flex-1 overflow-y-auto p-2 scrollbar-thin" id="conversationsList">
                <div id="convListEmpty" class="px-3 py-10 text-center hidden">
                    <i data-lucide="message-square-dashed" class="w-7 h-7 text-zinc-700 mx-auto mb-2"></i>
                    <p class="text-[10px] text-zinc-600 uppercase tracking-wider">No conversations yet</p>
                </div>
            </div>

            <!-- Footer -->
            <div class="p-4 border-t border-white/10 text-center safe-pb overflow-hidden">
                <p class="sidebar-text text-[10px] text-zinc-600 uppercase tracking-widest whitespace-nowrap">© Sunnydev</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col w-full relative bg-transparent overflow-hidden">

            <!-- Header -->
            <header
                class="h-16 border-b border-white/5 flex items-center justify-between px-4 md:px-8 bg-zinc-950/80 backdrop-blur-md z-30 sticky top-0">
                <div class="flex items-center gap-3">
                    <!-- Mobile Menu Toggle -->
                    <button onclick="openMobileSidebar()"
                        class="md:hidden p-2 text-zinc-300 bg-white/5 rounded-lg border border-white/10 active:bg-white/10 transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>

                    <h1
                        class="text-lg md:text-2xl font-bold tracking-tighter bg-gradient-to-r from-white via-slate-300 to-gray-500 bg-clip-text text-transparent truncate">
                        Poornima Oracle
                    </h1>
                </div>
                <div class="flex items-center gap-2">
                    <button id="autoReadToggle" onclick="toggleAutoRead()" aria-label="Toggle auto-read AI answers"
                        aria-pressed="false"
                        class="auto-read-toggle border border-white/10 bg-white/[0.03] px-3 py-2 hover:bg-white/10 rounded-lg text-zinc-400 hover:text-white transition flex items-center gap-2 active:scale-95 text-xs font-medium whitespace-nowrap">
                        <i data-lucide="headphones" class="w-4 h-4"></i>
                        <span>Auto-read</span>
                    </button>
                    <button onclick="showApiModal()" aria-label="Open API settings"
                        class="p-2 hover:bg-white/10 rounded-lg text-zinc-400 hover:text-white transition flex items-center gap-2 active:scale-95">
                        <i data-lucide="settings" class="w-6 h-6"></i>
                    </button>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="relative flex-1 overflow-hidden">
                <div class="chat-ambient" aria-hidden="true">
                    <div class="chat-orb chat-orb-cyan"></div>
                    <div class="chat-orb chat-orb-blue"></div>
                    <div class="chat-orb chat-orb-purple"></div>
                </div>
                <div class="relative z-10 h-full overflow-y-auto p-4 md:p-6 scrollbar-thin" id="chatContainer">
                    <!-- Content injected via JS -->
                </div>
                <div class="chat-bottom-fade" aria-hidden="true"></div>
                <button id="scrollToBottomButton" type="button" onclick="scrollChatToBottom()"
                    class="hidden absolute bottom-4 right-4 z-30 inline-flex items-center gap-2 rounded-full border border-cyan-400/30 bg-zinc-950/85 px-4 py-2 text-xs font-semibold text-cyan-100 shadow-lg shadow-cyan-950/30 backdrop-blur-md hover:bg-cyan-500/10 hover:text-white transition active:scale-95">
                    New message+
                </button>
            </div>

            <!-- Input Area -->
            <div class="p-3 md:p-6 bg-gradient-to-t from-zinc-950 via-zinc-950 to-transparent z-20 safe-pb">
                <div class="max-w-3xl mx-auto relative group">
                    <div
                        class="aurora-glow absolute -inset-1 bg-gradient-to-r from-cyan-500/20 via-purple-500/10 to-blue-500/20 rounded-2xl blur-md opacity-50 group-hover:opacity-75 transition-opacity duration-500 hidden md:block">
                    </div>
                    <div class="glass-input rounded-2xl flex items-end p-1.5 md:p-2 relative z-10">
                        <textarea id="messageInput"
                            class="w-full bg-transparent border-none text-white placeholder-zinc-500 px-3 md:px-4 py-3 focus:ring-0 resize-none max-h-32 md:max-h-48 overflow-y-auto text-base"
                            rows="1" placeholder="Ask here..." onkeydown="handleKeyPress(event)"
                            oninput="adjustTextareaHeight(this)"></textarea>
                        <button id="micButton" onclick="toggleSpeechRecognition()" aria-label="Start voice input"
                            aria-pressed="false" title="Start voice input"
                            class="p-3 rounded-xl border border-white/10 bg-white/[0.03] text-zinc-400 hover:bg-white/10 hover:text-white transition-all active:scale-95 mb-0.5 mr-2 flex items-center justify-center shrink-0">
                            <i data-lucide="mic" class="w-5 h-5"></i>
                        </button>
                        <button id="sendButton" onclick="sendMessage({ allowSpeech: true })"
                            class="p-3 rounded-xl bg-white text-black hover:bg-zinc-200 transition-all active:scale-95 shadow-[0_0_15px_rgba(255,255,255,0.1)] mb-0.5 mr-0.5 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center shrink-0">
                            <i data-lucide="send" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <p class="text-center text-[10px] text-zinc-600 mt-2 md:mt-3 uppercase tracking-widest hidden md:block">
                    Poornima Oracle can make mistakes. Check important info.<br>
                    © 2025 Sunnydev.All rights reserved.
                </p>
            </div>
        </main>
    </div>

    <!-- Hidden Template for Welcome Screen -->
    <template id="welcomeTemplate">
        <div id="welcomeScreen"
            class="h-full flex flex-col items-center justify-center max-w-4xl mx-auto animate-fade-in py-8">
            <div
                class="w-20 h-20 md:w-24 md:h-24 rounded-full border-2 border-white/10 mb-6 shadow-[0_0_30px_rgba(6,182,212,0.2)] shrink-0">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQm0aT7k5O09y2256AMvDppRfJq7pIeV9d0KA&s"
                    alt="Oracle" class="oracle-avatar-breathe w-full h-full object-cover">
            </div>
            <h1
                class="text-2xl md:text-5xl font-bold text-center mb-4 bg-gradient-to-r from-cyan-300 via-white to-cyan-300 bg-clip-text text-transparent drop-shadow-sm px-2">
                "Hey there! Got questions?"
            </h1>
           <p class="text-zinc-400 text-center  md:mb-3 max-w-lg text-base md:text-lg font-light px-4">
                You've officially come to the right place. Ask me anything about campus life.
            </p>
            <p class="text-cyan-400 text-center md:mb-12 max-w-lg text-base md:text-xs font-light px-4">
                Use Demo Mode if you want to try the UI without a backend endpoint.
            </p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 w-full max-w-3xl px-4"
                data-suggestion-grid>
            </div>
        </div>
    </template>

    <script>
        function refreshIcons() {
            if (window.lucide?.createIcons) {
                lucide.createIcons();
            }
        }

        refreshIcons();
        if (window.marked) {
            marked.setOptions({ gfm: true, breaks: true });
        }

        const DEFAULT_API_ENDPOINT = 'https://poornima-oracle.onrender.com/api/chat';
        const HISTORY_STORAGE_KEY = 'poornimaOracleConversationHistory';
        const DEMO_MODE_STORAGE_KEY = 'poornimaOracleDemoMode';
        const AUTO_READ_STORAGE_KEY = 'poornimaOracleAutoRead';
        const PROMPT_COLOR_CLASSES = {
            cyan: {
                border: 'hover:border-cyan-500/30',
                bg: 'bg-cyan-500/10',
                text: 'text-cyan-400',
                hoverText: 'group-hover:text-cyan-300',
            },
            rose: {
                border: 'hover:border-rose-500/30',
                bg: 'bg-rose-500/10',
                text: 'text-rose-400',
                hoverText: 'group-hover:text-rose-300',
            },
            amber: {
                border: 'hover:border-amber-500/30',
                bg: 'bg-amber-500/10',
                text: 'text-amber-400',
                hoverText: 'group-hover:text-amber-300',
            },
            emerald: {
                border: 'hover:border-emerald-500/30',
                bg: 'bg-emerald-500/10',
                text: 'text-emerald-400',
                hoverText: 'group-hover:text-emerald-300',
            },
        };
        const ALL_PROMPTS = [
            {
                title: 'Anti-Ragging',
                description: 'Policy and reporting',
                icon: 'shield',
                color: 'cyan',
                prompt: 'What is Poornima University anti-ragging policy, and what should a student do to report an incident?',
            },
            {
                title: 'Hostel Rules',
                description: 'Prohibited items',
                icon: 'ban',
                color: 'rose',
                prompt: 'What items are prohibited in Poornima hostel rooms, and why are those rules enforced?',
            },
            {
                title: 'SCOPE',
                description: 'Scholarship details',
                icon: 'graduation-cap',
                color: 'emerald',
                prompt: 'Explain the SCOPE scholarship for online courses, including eligibility, benefits, and how to apply.',
            },
            {
                title: 'Library',
                description: 'Hours and services',
                icon: 'library',
                color: 'amber',
                prompt: 'What are the library hours at Poornima, and what services can students use there?',
            },
            {
                title: 'Attendance',
                description: 'Minimum rules',
                icon: 'clipboard-check',
                color: 'cyan',
                prompt: 'Explain Poornima attendance rules, minimum attendance requirements, and what happens if a student falls short.',
            },
            {
                title: 'Back Exam',
                description: 'Process overview',
                icon: 'refresh-cw',
                color: 'rose',
                prompt: 'Explain the back exam process at Poornima, including forms, fees, schedule, and result handling.',
            },
            {
                title: 'Fees',
                description: 'Payment guidance',
                icon: 'receipt',
                color: 'emerald',
                prompt: 'Summarize the Poornima fee structure and payment process for a student who wants clear next steps.',
            },
            {
                title: 'Placements',
                description: 'Campus hiring',
                icon: 'briefcase',
                color: 'amber',
                prompt: 'How does the Poornima placement process work, from registration to interviews and offer letters?',
            },
            {
                title: 'Campus Wi-Fi',
                description: 'Access help',

        function getDefaultApiEndpoint() {
            return DEFAULT_API_ENDPOINT;
        }

        function ensureApiEndpoint() {
            const storedEndpoint = localStorage.getItem('geminiApiEndpoint');
            const normalizedStoredEndpoint = typeof storedEndpoint === 'string' ? storedEndpoint.trim() : '';
            const endpoint = normalizedStoredEndpoint || getDefaultApiEndpoint();

            if (!normalizedStoredEndpoint) {
                localStorage.setItem('geminiApiEndpoint', endpoint);
            }

            return endpoint;
        }

        // ===== ConversationStore: IndexedDB-backed persistent multi-conversation storage =====
        class ConversationStore {
            constructor() {
                this.dbName = 'poornima-oracle-db';
                this.storeName = 'conversations';
                this.db = null;
                this._fallback = false;
            }

            async init() {
                try {
                    this.db = await this._openDB();
                } catch (e) {
                    console.warn('[Oracle] IndexedDB unavailable, using localStorage fallback:', e);
                    this._fallback = true;
                }
            }

            _openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.storeName)) {
                            const os = db.createObjectStore(this.storeName, { keyPath: 'id' });
                            os.createIndex('updatedAt', 'updatedAt', { unique: false });
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            generateId() {
                return `conv-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
            }

            generateTitle(message) {
                if (!message) return 'New Chat';
                const maxLen = 45;
                const text = String(message).trim().replace(/\s+/g, ' ');
                if (text.length <= maxLen) return text;
                const truncated = text.substring(0, maxLen);
                const lastSpace = truncated.lastIndexOf(' ');
                return (lastSpace > 15 ? truncated.substring(0, lastSpace) : truncated) + '\u2026';
            }

            async saveConversation(conv) {
                if (!conv || !conv.id) return;
                conv.updatedAt = Date.now();
                if (this._fallback) { this._fbSave(conv); return; }
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readwrite');
                    tx.objectStore(this.storeName).put(conv);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            }

            async getConversation(id) {
                if (this._fallback) return this._fbLoad().find(c => c.id === id) || null;
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readonly');
                    const req = tx.objectStore(this.storeName).get(id);
                    req.onsuccess = (e) => resolve(e.target.result || null);
                    req.onerror = (e) => reject(e.target.error);
                });
            }

            async getAllConversations() {
                if (this._fallback) {
                    return this._fbLoad().sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
                }
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readonly');
                    const req = tx.objectStore(this.storeName).index('updatedAt').getAll();
                    req.onsuccess = (e) => resolve((e.target.result || []).reverse());
                    req.onerror = (e) => reject(e.target.error);
                });
            }

            async deleteConversation(id) {
                if (this._fallback) {
                    const all = this._fbLoad().filter(c => c.id !== id);
                    localStorage.setItem('poornimaOracleConversations', JSON.stringify(all));
                    return;
                }
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readwrite');
                    tx.objectStore(this.storeName).delete(id);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            }

            _fbSave(conv) {
                const all = this._fbLoad();
                const idx = all.findIndex(c => c.id === conv.id);
                if (idx >= 0) all[idx] = conv; else all.unshift(conv);
                localStorage.setItem('poornimaOracleConversations', JSON.stringify(all));
            }

            _fbLoad() {
                try {
                    return JSON.parse(localStorage.getItem('poornimaOracleConversations') || '[]');
                } catch (e) { return []; }
            }
        }

        // ===== Sidebar Conversation List Rendering =====
        async function renderSidebarConversations() {
            const listEl = document.getElementById('conversationsList');
            const emptyEl = document.getElementById('convListEmpty');
            if (!listEl || !store) return;

            let convs = [];
            try { convs = await store.getAllConversations(); } catch (e) { console.warn(e); }

            // Remove previously-rendered dynamic items
            listEl.querySelectorAll('[data-conv-item]').forEach(el => el.remove());

            const activeId = activeConversation ? activeConversation.id : '';

            if (convs.length === 0) {
                if (emptyEl) emptyEl.classList.remove('hidden');
                return;
            }
            if (emptyEl) emptyEl.classList.add('hidden');

            const fragment = document.createDocumentFragment();
            convs.forEach(conv => {
                const isActive = conv.id === activeId;
                const item = document.createElement('div');
                item.setAttribute('data-conv-item', conv.id);
                item.className = [
                    'sidebar-item group flex items-center gap-2.5 p-3 rounded-xl cursor-pointer',
                    'border transition-all mb-1 touch-manipulation',
                    isActive
                        ? 'bg-zinc-800/70 border-cyan-500/20 text-white shadow-[0_0_12px_rgba(34,211,238,0.08)]'
                        : 'border-transparent hover:bg-white/5 hover:border-white/10 text-zinc-400 hover:text-zinc-200',
                ].join(' ');

                const safeId = escapeHtml(conv.id);
                item.innerHTML = `
                    <i data-lucide="${isActive ? 'message-square-text' : 'message-square'}"
                        class="sidebar-icon w-4 h-4 ${isActive ? 'text-cyan-400' : 'text-zinc-600 group-hover:text-zinc-400'} shrink-0 transition-colors"></i>
                    <span class="sidebar-text text-xs truncate flex-1 ${isActive ? 'font-medium text-white' : 'font-light'}">${escapeHtml(conv.title || 'New Chat')}</span>
                    <button class="sidebar-text opacity-0 group-hover:opacity-100 p-1 rounded-lg
                                   text-zinc-600 hover:text-rose-400 hover:bg-rose-500/10 transition-all shrink-0"
                            title="Delete conversation"
                            onclick="event.stopPropagation(); handleDeleteConversation('${safeId}')">
                        <i data-lucide="trash-2" class="w-3 h-3"></i>
                    </button>`;

                item.addEventListener('click', () => handleSwitchConversation(conv.id));
                fragment.appendChild(item);
            });

            listEl.prepend(fragment);
            refreshIcons();
        }

        async function handleSwitchConversation(id) {
            if (activeConversation && activeConversation.id === id) {
                if (window.innerWidth < 768) closeMobileSidebar();
                return;
            }
            if (isLoading) return;

            // Save current conversation before switching
            if (activeConversation && activeConversation.messages.length > 0) {
                try { await store.saveConversation(activeConversation); } catch (e) { console.warn(e); }
            }

            try {
                const conv = await store.getConversation(id);
                if (!conv) return;

                activeConversation = conv;
                conversationHistory = activeConversation.messages;
                localStorage.setItem('activeConversationId', id);
                chatStarted = conv.messages.length > 0;
                messageCount = conv.messages.length;
                isLoading = false;
                stopSpeechRecognition();
                stopCurrentSpeech();

                const chatContainer = document.getElementById('chatContainer');
                chatContainer.innerHTML = '';

                if (conv.messages.length === 0) {
                    renderWelcomeScreen();
                } else {
                    for (const msg of conv.messages) {
                        if (msg.role === 'user') renderUserMessage(msg);
                        else if (msg.role === 'assistant') renderAssistantMessage(msg);
                    }
                    requestAnimationFrame(() => {
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                        updateScrollToBottomButton();
                    });
                }

                const input = document.getElementById('messageInput');
                input.value = '';
                input.style.height = 'auto';
                const sendBtn = document.getElementById('sendButton');
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i data-lucide="send" class="w-5 h-5"></i>';

                await renderSidebarConversations();
                refreshIcons();
                if (window.innerWidth < 768) closeMobileSidebar();
                else input.focus();
            } catch (e) { 
                console.error('[Oracle] Failed to switch conversation:', e);
            }
        }

        async function handleDeleteConversation(id) {
            try {
                await store.deleteConversation(id);
                if (activeConversation && activeConversation.id === id) {
                    await startNewChat();
                } else {
                    await renderSidebarConversations();
                }
            } catch (e) {
                console.error('[Oracle] Failed to delete conversation:', e);
            }
        }

        async function migrateOldHistory() {
            const oldData = localStorage.getItem(HISTORY_STORAGE_KEY);
            if (!oldData) return null;
            try {
                const messages = JSON.parse(oldData);
                if (!Array.isArray(messages) || messages.length === 0) {
                    localStorage.removeItem(HISTORY_STORAGE_KEY);
                    return null;
                }
                const firstUserMsg = messages.find(m => m.role === 'user');
                const conv = {
                    id: store.generateId(),
                    title: store.generateTitle(firstUserMsg ? firstUserMsg.content : 'Previous Chat'),
                    titled: true,
                    createdAt: Date.now(),
                    updatedAt: Date.now(),
                    messages,
                };
                await store.saveConversation(conv);
                localStorage.removeItem(HISTORY_STORAGE_KEY);
                console.log('[Oracle] Migrated old history to IndexedDB.');
                return conv.id;
            } catch (e) {
                console.warn('[Oracle] Migration failed:', e);
                return null;
            }
        }

        // ===== State Variables =====
        let chatStarted = false;
        let messageCount = 0;
        let conversationHistory = [];       // Always mirrors activeConversation.messages
        let demoMode = localStorage.getItem(DEMO_MODE_STORAGE_KEY) === 'true';
        let apiEndpoint = ensureApiEndpoint();
        let isLoading = false;
        let isSidebarCollapsed = false;
        let speechRecognition = null;
        let isListening = false;
        let autoReadEnabled = localStorage.getItem(AUTO_READ_STORAGE_KEY) === 'true';
        let speechUserGestureUnlocked = false;
        let currentSpeechMessageId = '';
        let currentSpeechUtterance = null;
        let scrollAffordanceTimer = null;
        let store = null;                   // ConversationStore instance
        let activeConversation = null;      // Currently active conversation object

        window.addEventListener('load', async () => {
            apiEndpoint = ensureApiEndpoint();
            document.getElementById('apiEndpoint').value = apiEndpoint;

            // 1. Initialize IndexedDB conversation store
            store = new ConversationStore();
            await store.init();

            // 2. Migrate any old single-conversation localStorage data
            const migratedId = await migrateOldHistory();

            // 3. Determine which conversation to restore
            const savedActiveId = migratedId || localStorage.getItem('activeConversationId');
            let restored = false;

            if (savedActiveId) {
                try {
                    const conv = await store.getConversation(savedActiveId);
                    if (conv && conv.messages.length > 0) {
                        activeConversation = conv;
                        conversationHistory = activeConversation.messages;
                        chatStarted = true;
                        messageCount = conv.messages.length;
                        localStorage.setItem('activeConversationId', conv.id);

                        const chatContainer = document.getElementById('chatContainer');
                        chatContainer.innerHTML = '';
                        for (const msg of conv.messages) {
                            if (msg.role === 'user') renderUserMessage(msg);
                            else if (msg.role === 'assistant') renderAssistantMessage(msg);
                        }
                        requestAnimationFrame(() => {
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                            updateScrollToBottomButton();
                        });
                        restored = true;
                    }
                } catch (e) {
                    console.warn('[Oracle] Failed to restore conversation:', e);
                }
            }

            if (!restored) {
                // Start a fresh conversation shell for the welcome screen
                activeConversation = {
                    id: store.generateId(),
                    title: 'New Chat',
                    titled: false,
                    createdAt: Date.now(),
                    updatedAt: Date.now(),
                    messages: [],
                };
                conversationHistory = activeConversation.messages;
                localStorage.setItem('activeConversationId', activeConversation.id);
                renderWelcomeScreen();
            }

            // 4. Render sidebar with all stored conversations
            await renderSidebarConversations();

            initializeVoiceFeatures();
            initializeScrollAffordance();
            refreshIcons();

            // Focus input on desktop only
            if (window.innerWidth > 768) {
                document.getElementById('messageInput').focus();
            }

            new ClickSpark();

            // Prevent double tap zoom on iOS
            document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
        });

        // --- Sidebar Logic ---
        function openMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
        }

        function closeMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
        }

        function toggleSidebarDesktop() {
            const sidebar = document.getElementById('sidebar');
            const collapseIcon = document.getElementById('collapseIcon');
            isSidebarCollapsed = !isSidebarCollapsed;

            if (isSidebarCollapsed) {
                sidebar.classList.add('collapsed', 'w-20');
                sidebar.classList.remove('w-72', 'md:w-72');
                // Need to override tailwind class for width
                sidebar.style.width = '80px';
                collapseIcon.classList.add('rotate-180');
            } else {
                sidebar.classList.remove('collapsed', 'w-20');
                sidebar.classList.add('w-72');
                sidebar.style.width = ''; // Reset inline style to use class
                collapseIcon.classList.remove('rotate-180');
            }
        }

        async function startNewChat() {
            // 1. Save current conversation if it has messages
            if (activeConversation && activeConversation.messages.length > 0) {
                try { await store.saveConversation(activeConversation); } catch (e) { console.warn(e); }
            }

            // 2. Stop any in-flight activity
            stopSpeechRecognition();
            stopCurrentSpeech();
            chatStarted = false;
            messageCount = 0;
            isLoading = false;

            // 3. Create a fresh conversation object
            activeConversation = {
                id: store.generateId(),
                title: 'New Chat',
                titled: false,
                createdAt: Date.now(),
                updatedAt: Date.now(),
                messages: [],
            };
            conversationHistory = activeConversation.messages;
            localStorage.setItem('activeConversationId', activeConversation.id);

            // 4. Reset UI
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.innerHTML = '';
            renderWelcomeScreen();
            updateScrollToBottomButton();

            // 5. Reset Input
            const input = document.getElementById('messageInput');
            input.value = '';
            input.style.height = 'auto';

            // 6. Reset Button
            const sendBtn = document.getElementById('sendButton');
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i data-lucide="send" class="w-5 h-5"></i>';

            // 7. Refresh Icons
            refreshIcons();

            // 8. Update sidebar + close on mobile
            await renderSidebarConversations();

            if (window.innerWidth < 768) {
                closeMobileSidebar();
            } else {
                input.focus();
            }
        }

        function initializeScrollAffordance() {
            const chatContainer = document.getElementById('chatContainer');
            if (!chatContainer) return;

            chatContainer.addEventListener('scroll', handleChatScroll, { passive: true });
            updateScrollToBottomButton();
        }

        function handleChatScroll() {
            if (scrollAffordanceTimer) return;

            scrollAffordanceTimer = window.setTimeout(() => {
                scrollAffordanceTimer = null;
                updateScrollToBottomButton();
            }, 100);
        }

        function updateScrollToBottomButton() {
            const chatContainer = document.getElementById('chatContainer');
            const scrollButton = document.getElementById('scrollToBottomButton');
            if (!chatContainer || !scrollButton) return;

            const isAwayFromBottom = chatContainer.scrollTop < chatContainer.scrollHeight - chatContainer.clientHeight - 100;
            scrollButton.classList.toggle('hidden', !isAwayFromBottom);
        }

        function scrollChatToBottom() {
            const chatContainer = document.getElementById('chatContainer');
            if (!chatContainer) return;

            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
            window.setTimeout(updateScrollToBottomButton, 120);

        // --- Voice Integration ---
        function initializeVoiceFeatures() {
            updateAutoReadToggle();

            const micButton = document.getElementById('micButton');
            if (!getSpeechRecognitionConstructor() && micButton) {
                micButton.classList.add('hidden');
                micButton.setAttribute('aria-hidden', 'true');
            }

            const autoReadToggle = document.getElementById('autoReadToggle');
            if (!canUseSpeechSynthesis() && autoReadToggle) {
                autoReadToggle.classList.add('hidden');
                autoReadToggle.setAttribute('aria-hidden', 'true');
            }
        }

        function getSpeechRecognitionConstructor() {
            return window.SpeechRecognition || window.webkitSpeechRecognition || null;
        }

        function toggleSpeechRecognition() {
            if (isListening) {
                stopSpeechRecognition();
                return;
            }

            const RecognitionCtor = getSpeechRecognitionConstructor();
            const micButton = document.getElementById('micButton');
            if (!RecognitionCtor) {
                if (micButton) {
                    micButton.classList.add('hidden');
                    micButton.setAttribute('aria-hidden', 'true');
                }
                return;
            }

            if (!speechRecognition) {
                speechRecognition = new RecognitionCtor();
                speechRecognition.continuous = false;
                speechRecognition.interimResults = false;
                speechRecognition.lang = 'en-IN';

                speechRecognition.onstart = () => setListeningState(true);
                speechRecognition.onend = () => setListeningState(false);
                speechRecognition.onspeechend = () => {
                    if (isListening) {
                        speechRecognition.stop();
                    }
                };
                speechRecognition.onerror = (event) => {
                    console.warn('Speech recognition error:', event.error || event);
                    setListeningState(false);
                };
                speechRecognition.onresult = (event) => {
                    const transcript = Array.from(event.results || [])
                        .map(result => result?.[0]?.transcript || '')
                        .join(' ')
                        .trim();
                    appendTranscriptToInput(transcript);
                };
            }

            try {
                speechRecognition.start();
            } catch (error) {
                console.warn('Speech recognition could not start:', error);
                setListeningState(false);
            }
        }

        function stopSpeechRecognition() {
            if (speechRecognition && isListening) {
                try {
                    speechRecognition.stop();
                } catch (error) {
                    console.warn('Speech recognition could not stop:', error);
                }
            }
            setListeningState(false);
        }

        function setListeningState(listening) {
            isListening = listening;
            const micButton = document.getElementById('micButton');
            if (!micButton) return;

            micButton.classList.toggle('mic-listening', listening);
            micButton.setAttribute('aria-pressed', listening ? 'true' : 'false');
            micButton.setAttribute('aria-label', listening ? 'Stop voice input' : 'Start voice input');
            micButton.title = listening ? 'Listening...' : 'Start voice input';
        }

        function appendTranscriptToInput(transcript) {
            if (!transcript) return;

            const input = document.getElementById('messageInput');
            const needsSpace = input.value && !/\s$/.test(input.value);
            input.value = `${input.value}${needsSpace ? ' ' : ''}${transcript}`;
            adjustTextareaHeight(input);
            input.focus();
        }

        function canUseSpeechSynthesis() {
            return Boolean(window.speechSynthesis && typeof window.SpeechSynthesisUtterance === 'function');
        }

        function toggleAutoRead() {
            if (!canUseSpeechSynthesis()) return;

            speechUserGestureUnlocked = true;
            autoReadEnabled = !autoReadEnabled;
            localStorage.setItem(AUTO_READ_STORAGE_KEY, autoReadEnabled ? 'true' : 'false');
            updateAutoReadToggle();

            if (!autoReadEnabled) {
                stopCurrentSpeech();
            }
        }

        function updateAutoReadToggle() {
            const toggle = document.getElementById('autoReadToggle');
            if (!toggle) return;

            toggle.setAttribute('aria-pressed', autoReadEnabled ? 'true' : 'false');
            toggle.setAttribute(
                'aria-label',
                autoReadEnabled ? 'Turn off auto-read AI answers' : 'Turn on auto-read AI answers'
            );
            toggle.title = autoReadEnabled ? 'Auto-read is on' : 'Auto-read is off';
        }

        function toggleMessageSpeech(messageId) {
            speechUserGestureUnlocked = true;

            if (currentSpeechMessageId === messageId) {
                stopCurrentSpeech();
                return;
            }

            speakAssistantMessage(messageId);
        }

        function readAssistantMessage(messageId) {
            speechUserGestureUnlocked = true;
            speakAssistantMessage(messageId);
        }

        function maybeAutoReadAssistantMessage(messageId) {
            if (!autoReadEnabled || !speechUserGestureUnlocked) return;
            speakAssistantMessage(messageId);
        }

        function speakAssistantMessage(messageId) {
            if (!canUseSpeechSynthesis()) return;

            const message = conversationHistory.find(item => item.id === messageId && item.role === 'assistant');
            if (!message) return;

            const speechText = getReadableSpeechText(message.content);
            if (!speechText) return;

            stopCurrentSpeech();

            const utterance = new SpeechSynthesisUtterance(speechText);
            utterance.lang = 'en-IN';
            utterance.rate = 1;
            utterance.pitch = 1;
            currentSpeechMessageId = messageId;
            currentSpeechUtterance = utterance;
            updateSpeechButton(messageId, true);

            utterance.onend = () => finishCurrentSpeech(messageId, utterance);
            utterance.onerror = () => finishCurrentSpeech(messageId, utterance);
            window.speechSynthesis.speak(utterance);
        }

        function stopCurrentSpeech() {
            if (!canUseSpeechSynthesis()) return;

            const previousMessageId = currentSpeechMessageId;
            currentSpeechMessageId = '';
            currentSpeechUtterance = null;
            window.speechSynthesis.cancel();

            if (previousMessageId) {
                updateSpeechButton(previousMessageId, false);
            }
        }

        function finishCurrentSpeech(messageId, utterance) {
            if (currentSpeechUtterance !== utterance) return;

            currentSpeechMessageId = '';
            currentSpeechUtterance = null;
            updateSpeechButton(messageId, false);
        }

        function updateSpeechButton(messageId, speaking) {
            const buttons = document.querySelectorAll(`[data-speech-for="${CSS.escape(messageId)}"]`);
            if (!buttons.length) return;

            buttons.forEach((button) => {
                const isLabeled = button.dataset.speechLabel === 'true';
                const label = speaking ? 'Stop reading' : 'Read Aloud';
                button.setAttribute('aria-pressed', speaking ? 'true' : 'false');
                button.setAttribute('aria-label', speaking ? 'Stop reading response aloud' : 'Read response aloud');
                button.innerHTML = `<i data-lucide="${speaking ? 'volume-x' : 'volume-2'}" class="w-4 h-4"></i>${isLabeled ? `<span>${label}</span>` : ''}`;
            });
            refreshIcons();
        }

        function getReadableSpeechText(text) {
            return String(text || '')
                .replace(/```[\s\S]*?```/g, ' ')
                .replace(/`([^`]+)`/g, '$1')
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                .replace(/^#{1,6}\s+/gm, '')
                .replace(/^[\s>*-]+/gm, '')
                .replace(/[*_~|]+/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function getAssistantMessage(messageId) {
            return conversationHistory.find(item => item.id === messageId && item.role === 'assistant') || null;
        }

        async function copyAssistantMessage(messageId, button) {
            const message = getAssistantMessage(messageId);
            const text = message?.content || '';
            if (!text) return;

            try {
                await writeClipboardText(text);
                showCopyTooltip(button);
            } catch (error) {
                console.warn('Response could not be copied:', error);
            }
        }

        async function writeClipboardText(text) {
            if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.setAttribute('readonly', '');
            textArea.style.position = 'fixed';
            textArea.style.opacity = '0';
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            textArea.remove();
        }

        function showCopyTooltip(button) {
            const tooltip = button?.querySelector('[data-copy-tooltip]');
            if (!tooltip) return;

            tooltip.classList.add('is-visible');
            if (button.copyTooltipTimer) {
                window.clearTimeout(button.copyTooltipTimer);
            }

            button.copyTooltipTimer = window.setTimeout(() => {
                tooltip.classList.remove('is-visible');
            }, 1100);
        }

        function getAssistantQuestion(messageId) {
            const messageIndex = conversationHistory.findIndex(item => item.id === messageId && item.role === 'assistant');
            if (messageIndex === -1) return '';

            const message = conversationHistory[messageIndex];
            if (message.question) return message.question;

            for (let index = messageIndex - 1; index >= 0; index--) {
                if (conversationHistory[index]?.role === 'user') {
                    return conversationHistory[index].content || '';
                }
            }

            return '';
        }

        async function regenerateAssistantMessage(messageId) {
            if (isLoading) return;

            const question = getAssistantQuestion(messageId).trim();
            if (!question) return;

            stopCurrentSpeech();
            await sendMessage({ allowSpeech: true, message: question });
        }

        // --- Chat Logic ---
        async function sendMessage(options = {}) {
            if (isLoading) return;

            if (options.allowSpeech) {
                speechUserGestureUnlocked = true;
            }

            const input = document.getElementById('messageInput');
            const hasMessageOverride = typeof options.message === 'string';
            const message = (hasMessageOverride ? options.message : input.value).trim();
            if (!message) return;

            const chatContainer = document.getElementById('chatContainer');
            if (!chatStarted) {
                chatContainer.innerHTML = '';
                chatStarted = true;
            }

            messageCount++;
            isLoading = true;

            const sendBtn = document.getElementById('sendButton');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<div class="w-5 h-5 border-2 border-black/30 border-t-black rounded-full animate-spin"></div>';

            // Add User Message
            const userMessage = { id: createMessageId('user'), role: 'user', content: String(message) };
            conversationHistory.push(userMessage);

            // Auto-title the conversation from the first user message
            if (activeConversation && !activeConversation.titled) {
                activeConversation.title = store.generateTitle(message);
                activeConversation.titled = true;
                // Update sidebar with the new title (deferred to not block UI)
                window.setTimeout(() => renderSidebarConversations(), 0);
            }

            saveConversationHistory();
            renderUserMessage(userMessage);
            refreshIcons();

            if (!hasMessageOverride) {
                input.value = '';
                input.style.height = 'auto';
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
            updateScrollToBottomButton();

            const assistantId = createMessageId('assistant');
            const assistantShell = renderAssistantShell(assistantId);
            const streamRenderer = createStreamRenderer(assistantShell.contentEl);
            refreshIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
            updateScrollToBottomButton();

            try {
                let responsePayload;
                if (demoMode || !apiEndpoint) {
                    responsePayload = await runDemoStream(streamRenderer);
                } else {
                    responsePayload = await callGeminiAPI(message, {
                        onSources: (sources) => {
                            assistantShell.sourcesEl.innerHTML = '';
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                            updateScrollToBottomButton();
                        },
                        onToken: (answer) => {
                            streamRenderer(answer);
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                            updateScrollToBottomButton();
                        },
                    });
                }

                const responseText = String(responsePayload.answer || '');
                const sources = Array.isArray(responsePayload.sources) ? responsePayload.sources : [];
                streamRenderer.flush(responseText);
                assistantShell.sourcesEl.innerHTML = '';
                assistantShell.feedbackEl.innerHTML = renderFeedbackControls(assistantId);
                conversationHistory.push({
                    id: assistantId,
                    role: 'assistant',
                    content: responseText,
                    sources,
                    feedback: '',
                    question: message,
                });
                saveConversationHistory();
                assistantShell.actionEl.innerHTML = renderAssistantActionBar(assistantId);
                refreshIcons();
                maybeAutoReadAssistantMessage(assistantId);

            } catch (err) {
                assistantShell.wrapper.remove();
                const errHTML = `<div class="flex justify-center mb-6"><div class="bg-rose-500/10 border border-rose-500/20 text-rose-400 px-4 py-2 rounded-xl text-sm">Error: ${escapeHtml(err.message)}</div></div>`;
                chatContainer.insertAdjacentHTML('beforeend', errHTML);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i data-lucide="send" class="w-5 h-5"></i>';
                refreshIcons();
                chatContainer.scrollTop = chatContainer.scrollHeight;
                updateScrollToBottomButton();
            }
        }

        async function callGeminiAPI(message, handlers = {}) {
            if (!apiEndpoint) {
                apiEndpoint = ensureApiEndpoint();
            }

            if (!apiEndpoint) throw new Error('API endpoint not configured.');
            const resp = await fetch(apiEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, history: conversationHistory })
            });
            if (!resp.ok) {
                const txt = await resp.text().catch(() => null);
                throw new Error(txt || `Request failed: ${resp.status}`);
            }

            const contentType = resp.headers.get('content-type') || '';
            if (!contentType.includes('text/event-stream')) {
                const data = await resp.json();
                const answer = data?.answer || data?.response || data?.text || data?.choices?.[0]?.message?.content || JSON.stringify(data);
                return { answer: String(answer), sources: Array.isArray(data?.sources) ? data.sources : [] };
            }

            const reader = resp.body?.getReader();
            if (!reader) {
                throw new Error('Streaming is not supported by this browser.');
            }

            const decoder = new TextDecoder();
            let buffer = '';
            let answer = '';
            let sources = [];
            let donePayload = null;

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split('\n\n');
                buffer = events.pop() || '';

                for (const eventBlock of events) {
                    const event = parseSseEvent(eventBlock);
                    if (!event) continue;

                    if (event.event === 'sources') {
                        sources = Array.isArray(event.data?.sources) ? event.data.sources : [];
                        handlers.onSources?.(sources);
                    } else if (event.event === 'token') {
                        const token = typeof event.data?.text === 'string' ? event.data.text : '';
                        answer += token;
                        handlers.onToken?.(answer, token);
                    } else if (event.event === 'done') {
                        donePayload = event.data || {};
                    } else if (event.event === 'error') {
                        throw new Error(event.data?.error || 'Streaming request failed.');
                    }
                }
            }

            if (buffer.trim()) {
                const event = parseSseEvent(buffer);
                if (event?.event === 'done') {
                    donePayload = event.data || {};
                }
            }

            return {
                answer: String(donePayload?.answer || answer),
                sources: Array.isArray(donePayload?.sources) ? donePayload.sources : sources,
            };
        }

        function parseSseEvent(block) {
            const lines = block.split(/\r?\n/);
            let event = 'message';
            const dataLines = [];

            for (const line of lines) {
                if (line.startsWith('event:')) {
                    event = line.slice(6).trim();
                } else if (line.startsWith('data:')) {
                    dataLines.push(line.slice(5).trimStart());
                }
            }

            if (!dataLines.length) return null;

            try {
                return { event, data: JSON.parse(dataLines.join('\n')) };
            } catch (error) {
                throw new Error('Received malformed stream data.');
            }
        }

        async function runDemoStream(render) {
            const answer = 'I am currently in **Demo Mode**. Please configure a backend API endpoint to stream Poornima Oracle answers with citations.';
            let rendered = '';
            for (const token of answer.split(/(\s+)/)) {
                rendered += token;
                render(rendered);
                await new Promise(resolve => window.setTimeout(resolve, 35));
            }
            render.flush(answer);
            return { answer, sources: [] };
        }

        function renderWelcomeScreen() {
            const template = document.getElementById('welcomeTemplate');
            const welcomeScreen = template.content.cloneNode(true);
            const suggestionGrid = welcomeScreen.querySelector('[data-suggestion-grid]');
            suggestionGrid.innerHTML = shufflePrompts(ALL_PROMPTS).slice(0, 4).map(createSuggestionCard).join('');
            suggestionGrid.querySelectorAll('[data-suggestion-card]').forEach((card, index) => {
                card.style.animation = 'staggerIn 0.4s ease-out both';
                card.style.animationDelay = `${index * 100}ms`;
            });
            document.getElementById('chatContainer').appendChild(welcomeScreen);
            refreshIcons();
        }

        function shufflePrompts(prompts) {
            const shuffled = [...prompts];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function createSuggestionCard(data) {
            const colorClasses = PROMPT_COLOR_CLASSES[data.color] || PROMPT_COLOR_CLASSES.cyan;
            const promptValue = escapeHtml(JSON.stringify(data.prompt));

            return `
                <div onclick="sendSuggestion(${promptValue})"
                    data-suggestion-card
                    class="glass p-4 rounded-xl cursor-pointer hover:bg-white/5 ${colorClasses.border} transition-all group active:scale-98 touch-manipulation">
                    <div class="flex items-start gap-3">
                        <div class="p-2 ${colorClasses.bg} rounded-lg ${colorClasses.text} ${colorClasses.hoverText} shrink-0">
                            <i data-lucide="${escapeHtml(data.icon)}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold text-zinc-200 text-sm">${escapeHtml(data.title)}</h3>
                            <p class="text-xs text-zinc-500 mt-1">${escapeHtml(data.description)}</p>
                        </div>
                    </div>
                </div>`;
        }

        function createMessageId(prefix) {
            return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        }

            // Persist active conversation to IndexedDB
            if (!activeConversation || !store) return;
            store.saveConversation(activeConversation).catch(e => console.warn('[Oracle] Save failed:', e));
        }

        function loadConversationHistory() {
            // History managed via ConversationStore — returns current in-memory array
            return activeConversation ? activeConversation.messages : [];
        }

            // Async restoration handled in window.load — kept as no-op stub
            return false;

            const chatContainer = document.getElementById('chatContainer');

                <div class="flex justify-end mb-6 animate-slide-in" data-message-id="${escapeHtml(message.id || '')}">
                    <div class="max-w-[85%] md:max-w-[70%] bg-white text-black p-3 md:p-4 rounded-2xl rounded-br-sm shadow-lg">
                        <p class="text-sm md:text-base leading-relaxed font-medium">${escapeHtml(message.content)}</p>
                    </div>
                    <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center ml-2 md:ml-3 mt-auto mb-1 shadow-md shrink-0">

        function renderAssistantShell(messageId) {
            const chatContainer = document.getElementById('chatContainer');
            const aiMsgHTML = `
                <div class="flex justify-start mb-6 animate-slide-in" data-message-id="${escapeHtml(messageId)}">
                    <div class="w-8 h-8 rounded-lg bg-zinc-800 border border-white/10 flex items-center justify-center mr-2 md:mr-3 mt-auto mb-1 shrink-0">
                        <i data-lucide="bot" class="w-5 h-5 text-cyan-400"></i>
                    </div>
                    <div class="group max-w-[85%] md:max-w-[70%]">
                        <div class="bg-zinc-800/80 border border-white/5 text-zinc-200 p-3 md:p-4 rounded-2xl rounded-bl-sm shadow-sm text-sm md:text-base">
                            <div class="ai-markdown" data-ai-content>
                                <div class="flex items-center h-6"><div class="typing-shimmer h-1.5 w-24 rounded-full"></div></div>

            const messageId = message.id || createMessageId('assistant');
            const shell = renderAssistantShell(messageId);
            shell.contentEl.innerHTML = renderMarkdown(message.content);
