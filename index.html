        function renderAssistantActionBar(messageId) {
            const safeMessageId = escapeHtml(messageId);

            return `
                <div class="assistant-action-bar hidden md:flex opacity-0 group-hover:opacity-100 transition mt-2 ml-1 items-center gap-2 text-xs text-zinc-500">
                    <button type="button" class="relative inline-flex items-center gap-1.5 rounded-full border border-white/10 bg-white/[0.03] px-3 py-1.5 font-medium hover:bg-white/10 hover:text-white transition" aria-label="Copy response" onclick="copyAssistantMessage('${safeMessageId}', this)">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                        <span>Copy</span>
                        <span class="copy-tooltip" data-copy-tooltip>Copied!</span>
                    </button>
                    <button type="button" class="speech-button inline-flex items-center gap-1.5 rounded-full border border-white/10 bg-white/[0.03] px-3 py-1.5 font-medium hover:bg-white/10 hover:text-white transition" aria-label="Read response aloud" aria-pressed="false" data-speech-for="${safeMessageId}" data-speech-label="true" onclick="readAssistantMessage('${safeMessageId}')">
                        <i data-lucide="volume-2" class="w-4 h-4"></i>
                        <span>Read Aloud</span>
                    </button>
                    <button type="button" class="inline-flex items-center gap-1.5 rounded-full border border-white/10 bg-white/[0.03] px-3 py-1.5 font-medium hover:bg-white/10 hover:text-white transition" aria-label="Regenerate response" onclick="regenerateAssistantMessage('${safeMessageId}')">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        <span>Regenerate</span>
                    </button>
                </div>`;
        }

        function createStreamRenderer(contentEl) {
            let latestText = '';
            let pendingFrame = false;

            const render = (text) => {
                latestText = text;
                if (pendingFrame) return;

                pendingFrame = true;
                requestAnimationFrame(() => {
                    contentEl.innerHTML = renderMarkdown(latestText);
                    pendingFrame = false;
                });
            };

            render.flush = (text) => {
                latestText = text;
                contentEl.innerHTML = renderMarkdown(latestText);
            };

            return render;
        }

        function renderMarkdown(text) {
            if (!text) return '<p class="text-zinc-500 italic">No response</p>';

            if (window.marked && window.DOMPurify) {
                const rawHtml = marked.parse(String(text));
                return DOMPurify.sanitize(rawHtml, {
                    ADD_ATTR: ['target', 'rel'],
                });
            }

            return escapeHtml(String(text)).replace(/\r\n/g, '\n').replace(/\n/g, '<br/>');
        }

        function renderSourceChips(sources) {
            return '';
        }

        function getSafeUrl(value) {
            if (typeof value !== 'string' || !value.trim()) {
                return '';
            }

            try {
                const url = new URL(value.trim(), window.location.href);
                return ['http:', 'https:'].includes(url.protocol) ? url.toString() : '';
            } catch (error) {
                return '';
            }
        }

        function renderFeedbackControls(messageId, selectedRating = '') {
            if (!messageId) return '';

            const upPressed = selectedRating === 'up' ? 'true' : 'false';
            const downPressed = selectedRating === 'down' ? 'true' : 'false';
            const speechControl = canUseSpeechSynthesis()
                ? `<button type="button" class="speech-button inline-flex h-8 w-8 items-center justify-center rounded-lg border border-white/10 bg-white/[0.03] hover:bg-white/10 hover:text-white transition" aria-label="Read response aloud" aria-pressed="false" data-speech-for="${escapeHtml(messageId)}" onclick="toggleMessageSpeech('${escapeHtml(messageId)}')">
                        <i data-lucide="volume-2" class="w-4 h-4"></i>
                    </button>`
                : '';

            return `
                <div class="mt-3 flex items-center gap-2 text-zinc-500" data-feedback-for="${escapeHtml(messageId)}">
                    ${speechControl}
                    <button type="button" class="feedback-button inline-flex h-8 w-8 items-center justify-center rounded-lg border border-white/10 bg-white/[0.03] hover:bg-white/10 hover:text-white transition" aria-label="Helpful response" aria-pressed="${upPressed}" onclick="submitFeedback('${escapeHtml(messageId)}', 'up')">
                        <i data-lucide="thumbs-up" class="w-4 h-4"></i>
                    </button>
                    <button type="button" class="feedback-button inline-flex h-8 w-8 items-center justify-center rounded-lg border border-white/10 bg-white/[0.03] hover:bg-white/10 hover:text-white transition" aria-label="Unhelpful response" aria-pressed="${downPressed}" onclick="submitFeedback('${escapeHtml(messageId)}', 'down')">
                        <i data-lucide="thumbs-down" class="w-4 h-4"></i>
                    </button>
                </div>`;
        }

        async function submitFeedback(messageId, rating) {
            const message = conversationHistory.find(item => item.id === messageId && item.role === 'assistant');
            if (!message) return;

            message.feedback = rating;
            saveConversationHistory();
            updateFeedbackButtons(messageId, rating);

            if (demoMode) return;

            try {
                await fetch(getFeedbackEndpoint(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messageId,
                        rating,
                        question: message.question || '',
                        answer: message.content || '',
                        sources: message.sources || [],
                    }),
                });
            } catch (error) {
                console.warn('Feedback could not be sent:', error);
            }
        }

        function updateFeedbackButtons(messageId, rating) {
            const wrapper = document.querySelector(`[data-feedback-for="${CSS.escape(messageId)}"]`);
            if (!wrapper) return;

            wrapper.querySelectorAll('.feedback-button').forEach((button) => {
                const label = button.getAttribute('aria-label') || '';
                const isSelected = rating === 'up' ? label.includes('Helpful') : label.includes('Unhelpful');
                button.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
            });
        }

        function getFeedbackEndpoint() {
            const endpoint = apiEndpoint || ensureApiEndpoint();
            try {
                const url = new URL(endpoint, window.location.href);
                if (/\/api\/chat\/?$/.test(url.pathname)) {
                    url.pathname = url.pathname.replace(/\/api\/chat\/?$/, '/api/feedback');
                } else {
                    url.pathname = '/api/feedback';
                }
                return url.toString();
            } catch (error) {
                return '/api/feedback';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        class ClickSpark {
            constructor() {
                this.canvas = document.getElementById('click-spark-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.sparks = [];
                this.sparkColor = '#fff';
                this.sparkSize = 10;
                this.sparkRadius = 15;
                this.sparkCount = 8;
                this.duration = 400;
                this.resize();
                this.initEvents();
                this.animate();
            }
            initEvents() {
                window.addEventListener('resize', () => this.resize());
                window.addEventListener('click', (e) => this.addSparks(e));
                window.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    this.addSparks({ clientX: touch.clientX, clientY: touch.clientY });
                });
            }
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }
            easeOut(t) { return t * (2 - t); }
            addSparks(e) {
                const now = performance.now();
                for (let i = 0; i < this.sparkCount; i++) {
                    this.sparks.push({
                        x: e.clientX,
                        y: e.clientY,
                        angle: (2 * Math.PI * i) / this.sparkCount,
                        startTime: now
                    });
                }
            }
            animate(timestamp) {
                if (!timestamp) timestamp = performance.now();
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.sparks = this.sparks.filter(spark => {
                    const elapsed = timestamp - spark.startTime;
                    if (elapsed >= this.duration) return false;
                    const progress = elapsed / this.duration;
                    const eased = this.easeOut(progress);
                    const distance = eased * this.sparkRadius;
                    const lineLength = this.sparkSize * (1 - eased);
                    const x1 = spark.x + distance * Math.cos(spark.angle);
                    const y1 = spark.y + distance * Math.sin(spark.angle);
                    const x2 = spark.x + (distance + lineLength) * Math.cos(spark.angle);
                    const y2 = spark.y + (distance + lineLength) * Math.sin(spark.angle);
                    this.ctx.strokeStyle = this.sparkColor;
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(x1, y1);
                    this.ctx.lineTo(x2, y2);
                    this.ctx.stroke();
                    return true;
                });
                requestAnimationFrame((t) => this.animate(t));
            }
        }
